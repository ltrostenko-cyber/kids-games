<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Skullcruncher!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;overflow:hidden;}
#gameCanvas{display:block;max-width:100vw;border-radius:8px;}
#hud{display:flex;justify-content:space-between;width:100%;max-width:600px;padding:8px 12px;color:#aaa;font-size:15px;}
#hud strong{color:#fff;}
#hint{color:#555;font-size:12px;text-align:center;margin-top:4px;}
</style>
</head>
<body>
<div id="hud">
  <span>❤️ <strong id="lives">5</strong></span>
  <span>Score: <strong id="score">0</strong></span>
  <span id="lvlLabel">Level 1: City</span>
<span id="dodgelabel">🚗 <strong id="dodgecount">0</strong>/50</span>
  <span>Best: <strong id="hi">0</strong></span>
</div>
<canvas id="gameCanvas" width="600" height="400"></canvas>
<p id="hint">Arrow keys to move • SPACE to chomp birds in Level 2</p>
<script>
const cv=document.getElementById('gameCanvas'),ctx=cv.getContext('2d');
const W=600,H=400;cv.width=W;cv.height=H;
cv.style.width=Math.min(window.innerWidth,600)+'px';
cv.style.height=(Math.min(window.innerWidth,600)*400/600)+'px';

const AC=new(window.AudioContext||window.webkitAudioContext)();
function res(){if(AC.state==='suspended')AC.resume();}

function honk(){res();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sawtooth';const f=180+Math.random()*160;o.frequency.setValueAtTime(f,AC.currentTime);o.frequency.setValueAtTime(f*1.07,AC.currentTime+0.1);o.frequency.setValueAtTime(f,AC.currentTime+0.2);g.gain.setValueAtTime(0.0001,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.2,AC.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.3);o.start();o.stop(AC.currentTime+0.32);}
function stomp(){res();for(let i=0;i<2;i++){const dl=i*0.17,dur=0.13;const buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,1.5);const src=AC.createBufferSource();src.buffer=buf;const flt=AC.createBiquadFilter();flt.type='lowpass';flt.frequency.value=100;const g=AC.createGain();g.gain.setValueAtTime(0.0001,AC.currentTime+dl);g.gain.exponentialRampToValueAtTime(0.5,AC.currentTime+dl+0.01);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dl+dur);src.connect(flt);flt.connect(g);g.connect(AC.destination);src.start(AC.currentTime+dl);src.stop(AC.currentTime+dl+dur+0.01);}}
function chirp(){res();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';const f=700+Math.random()*500;o.frequency.setValueAtTime(f,AC.currentTime);o.frequency.exponentialRampToValueAtTime(f*1.5,AC.currentTime+0.07);o.frequency.exponentialRampToValueAtTime(f*0.85,AC.currentTime+0.15);g.gain.setValueAtTime(0.0001,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.12,AC.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.18);o.start();o.stop(AC.currentTime+0.2);}
function doChomp(){res();const buf=AC.createBuffer(1,AC.sampleRate*0.2,AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.7);const src=AC.createBufferSource();src.buffer=buf;const flt=AC.createBiquadFilter();flt.type='bandpass';flt.frequency.value=500;flt.Q.value=2;const g=AC.createGain();g.gain.setValueAtTime(0.0001,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.55,AC.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.2);src.connect(flt);flt.connect(g);g.connect(AC.destination);src.start();src.stop(AC.currentTime+0.22);const o=AC.createOscillator(),og=AC.createGain();o.connect(og);og.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(90,AC.currentTime);o.frequency.exponentialRampToValueAtTime(35,AC.currentTime+0.1);og.gain.setValueAtTime(0.22,AC.currentTime);og.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.12);o.start();o.stop(AC.currentTime+0.14);}
function crash(){res();const buf=AC.createBuffer(1,AC.sampleRate*0.35,AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.5);const src=AC.createBufferSource();src.buffer=buf;const flt=AC.createBiquadFilter();flt.type='lowpass';flt.frequency.value=400;const g=AC.createGain();g.gain.setValueAtTime(0.0001,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.5,AC.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.35);src.connect(flt);flt.connect(g);g.connect(AC.destination);src.start();src.stop(AC.currentTime+0.37);}

const S=0.5;
let score=0,hi=0,lives=5,dead=false,level=1,tt=0,inv=0,stompT=0,trans=0,dodged=0,lvlNum=1;
const THRESH=200;
const P={x:W/2,y:H-60,spd:4.5,chomp:0};
let vehs=[],birds=[],parts=[],vT=55,bT=80;
const K={};

document.addEventListener('keydown',e=>{
  if(!K[e.key]){K[e.key]=true;res();}
  if((e.key===' '||e.key==='Enter')&&dead){reset();return;}
  if(e.key===' '&&!dead&&level===2){
    const near=birds.filter(b=>b.state==='diving'&&Math.abs(b.x-P.x)<65&&b.y>H-180);
    P.chomp=22;doChomp();
    if(near.length>0){
      birds=birds.filter(b=>{
        const hit=b.state==='diving'&&Math.abs(b.x-P.x)<65&&b.y>H-180;
        if(hit){score+=15;spark(b.x,b.y,'#ffdd55');}
        return !hit;
      });
    }
  }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{K[e.key]=false;});

function spark(x,y,c){for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:1,c});}}

function reset(){if(Math.floor(score)>hi){hi=Math.floor(score);document.getElementById('hi').textContent=hi;}score=0;lives=5;dead=false;level=1;tt=0;inv=0;trans=0;vehs=[];birds=[];parts=[];vT=55;bT=80;P.x=W/2;P.y=H-60;P.chomp=0;dodged=0;lvlNum=1;document.getElementById('score').textContent='0';document.getElementById('lives').textContent='5';document.getElementById('lvlLabel').textContent='Level 1: City';document.getElementById('dodgecount').textContent='0';}

function cityBg(){
  const sky=ctx.createLinearGradient(0,0,0,210);sky.addColorStop(0,'#607d8b');sky.addColorStop(1,'#90a4ae');ctx.fillStyle=sky;ctx.fillRect(0,0,W,210);
  ctx.fillStyle='rgba(215,228,233,0.8)';
  for(const[cx,cy,cr]of[[55,38,50],[190,22,42],[330,48,60],[468,28,46],[550,52,38]]){const rx=((cx-tt*0.3)%W+W)%W;ctx.beginPath();ctx.arc(rx,cy,cr*0.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(rx+cr*0.4,cy+6,cr*0.35,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(rx-cr*0.25,cy+8,cr*0.3,0,Math.PI*2);ctx.fill();}
  for(const[bx,bh,bw]of[[0,105,52],[60,72,46],[114,130,58],[180,52,50],[238,92,56],[302,62,46],[356,120,52],[416,82,48],[470,100,50],[528,68,40]]){ctx.fillStyle='#4a6572';ctx.fillRect(bx,210-bh,bw,bh);ctx.fillStyle='rgba(255,240,150,0.3)';for(let wy=210-bh+8;wy<204;wy+=15)for(let wx=bx+5;wx<bx+bw-5;wx+=11)if((bx+wy)%3!==0)ctx.fillRect(wx,wy,6,8);}
  ctx.fillStyle='#37474f';ctx.fillRect(0,210,W,190);
  ctx.strokeStyle='#ffee88';ctx.lineWidth=3;ctx.setLineDash([28,20]);
  for(const ly of[248,278,308,338,368]){ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();}
  ctx.setLineDash([]);
  ctx.fillStyle='#546e7a';ctx.fillRect(0,H-18,W,18);
}

function forestBg(){
  const sky=ctx.createLinearGradient(0,0,0,180);sky.addColorStop(0,'#2d5a27');sky.addColorStop(1,'#5a9e4f');ctx.fillStyle=sky;ctx.fillRect(0,0,W,180);
  ctx.fillStyle='#1b5e20';
  for(let i=0;i<14;i++){const tx=((i*46+tt*0.15)%W+W)%W;const th=50+Math.sin(i*1.8)*18;ctx.beginPath();ctx.moveTo(tx,180);ctx.lineTo(tx-18,180-th);ctx.lineTo(tx+18,180-th);ctx.closePath();ctx.fill();}
  const grd=ctx.createLinearGradient(0,180,0,H);grd.addColorStop(0,'#33691e');grd.addColorStop(1,'#1b5e20');ctx.fillStyle=grd;ctx.fillRect(0,180,W,H-180);
  ctx.strokeStyle='#558b2f';ctx.lineWidth=2;
  for(let i=0;i<22;i++){const gx=((i*29+tt*0.4)%W+W)%W;ctx.beginPath();ctx.moveTo(gx,182);ctx.lineTo(gx-3,173);ctx.stroke();ctx.beginPath();ctx.moveTo(gx,182);ctx.lineTo(gx+3,173);ctx.stroke();ctx.beginPath();ctx.moveTo(gx,182);ctx.lineTo(gx,170);ctx.stroke();}
  ctx.fillStyle='#4e342e';
  for(let i=0;i<6;i++){const tx=((i*108+20+tt*0.08)%W+W)%W;ctx.fillRect(tx-6,150,12,H-150);ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.arc(tx,144,36,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4e342e';}
}

function drawRobot(x,y){
  if(inv>0&&Math.floor(inv/5)%2===0)ctx.globalAlpha=0.3;
  ctx.save();ctx.translate(x,y);ctx.scale(S,S);
  ctx.fillStyle='#2e7d32';ctx.fillRect(-13,20,10,26);ctx.fillRect(3,20,10,26);
  ctx.fillStyle='#ad1457';ctx.fillRect(-14,26,12,9);ctx.fillRect(2,26,12,9);
  ctx.fillStyle='#1b5e20';ctx.fillRect(-16,44,16,9);ctx.fillRect(0,44,16,9);
  ctx.fillStyle='#388e3c';ctx.fillRect(-19,-6,38,28);
  ctx.fillStyle='#78909c';ctx.fillRect(-11,0,22,16);
  ctx.fillStyle='#ef5350';ctx.fillRect(-9,2,18,4);
  ctx.fillStyle='#42a5f5';ctx.fillRect(-9,8,12,3);
  ctx.fillStyle='#66bb6a';ctx.fillRect(-9,13,14,3);
  ctx.fillStyle='#6a1b9a';ctx.beginPath();ctx.arc(0,-3,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ce93d8';ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(4,-1);ctx.lineTo(0,-2);ctx.lineTo(-4,-1);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ad1457';ctx.fillRect(-29,-4,12,18);ctx.fillRect(17,-4,12,18);
  ctx.fillStyle='#2e7d32';ctx.fillRect(-27,12,9,22);ctx.fillRect(18,12,9,22);
  ctx.fillStyle='#1b5e20';ctx.fillRect(-28,32,11,10);ctx.fillRect(17,32,11,10);
  ctx.fillStyle='#ad1457';ctx.fillRect(26,24,5,24);
  ctx.fillStyle='#f48fb1';ctx.beginPath();ctx.moveTo(26,24);ctx.lineTo(31,24);ctx.lineTo(28.5,17);ctx.closePath();ctx.fill();
  ctx.fillStyle='#9e9e9e';ctx.fillRect(-34,34,8,5);
  ctx.fillStyle='#1b5e20';ctx.fillRect(-7,-14,14,10);
  ctx.fillStyle='#2e7d32';ctx.fillRect(-14,-36,28,24);
  ctx.fillStyle='#ad1457';ctx.fillRect(-14,-38,28,5);ctx.fillRect(-17,-36,5,16);ctx.fillRect(12,-36,5,16);
  ctx.fillStyle='#b71c1c';ctx.fillRect(-10,-30,20,9);
  ctx.fillStyle='#ef9a9a';ctx.fillRect(-8,-28,7,5);ctx.fillRect(1,-28,7,5);
  ctx.fillStyle='#ad1457';ctx.fillRect(-10,-46,20,10);ctx.fillRect(-8,-48,16,5);
  ctx.restore();ctx.globalAlpha=1;
}

function drawCroc(x,y){
  if(inv>0&&Math.floor(inv/5)%2===0)ctx.globalAlpha=0.3;
  ctx.save();ctx.translate(x,y);ctx.scale(S,S);
  ctx.fillStyle='#ad1457';ctx.beginPath();ctx.moveTo(32,8);ctx.quadraticCurveTo(62,4,72,-10);ctx.quadraticCurveTo(62,-4,32,18);ctx.closePath();ctx.fill();
  ctx.fillStyle='#880e4f';ctx.beginPath();ctx.moveTo(65,-6);ctx.lineTo(72,-10);ctx.lineTo(69,2);ctx.closePath();ctx.fill();
  ctx.fillStyle='#c2185b';for(let i=0;i<5;i++)ctx.fillRect(-8+i*10,-16,7,6);
  ctx.fillStyle='#c2185b';ctx.beginPath();ctx.ellipse(15,6,20,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#388e3c';ctx.beginPath();ctx.ellipse(-8,6,26,15,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.ellipse(-5,-3,24,9,0,0,Math.PI);ctx.fill();
  ctx.fillStyle='#a5d6a7';ctx.beginPath();ctx.ellipse(-5,12,18,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6a1b9a';ctx.beginPath();ctx.arc(10,4,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ce93d8';ctx.beginPath();ctx.moveTo(10,1);ctx.lineTo(14,6);ctx.lineTo(10,5);ctx.lineTo(6,6);ctx.closePath();ctx.fill();
  ctx.fillStyle='#2e7d32';ctx.fillRect(-28,18,12,16);ctx.fillRect(-14,20,10,14);ctx.fillRect(6,20,10,14);ctx.fillRect(20,18,12,16);
  ctx.fillStyle='#1b5e20';for(const lx of[-30,-16,4,18]){ctx.fillRect(lx-1,32,4,6);ctx.fillRect(lx+4,32,4,6);ctx.fillRect(lx+9,32,4,6);}
  ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.ellipse(-40,2,19,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ad1457';ctx.beginPath();ctx.ellipse(-40,-4,17,7,0,0,Math.PI);ctx.fill();
  ctx.fillStyle='rgba(100,180,255,0.35)';ctx.fillRect(-51,-5,19,8);ctx.strokeStyle='#546e7a';ctx.lineWidth=1;ctx.strokeRect(-51,-5,19,8);
  ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.ellipse(-55,2,15,5,0,0,Math.PI*2);ctx.fill();
  const jd=P.chomp>0?10:3;
  ctx.fillStyle='#388e3c';ctx.beginPath();ctx.ellipse(-55,2+jd,15,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';for(let i=0;i<6;i++)ctx.fillRect(-63+i*6,-1,3,6);
  ctx.fillStyle='#f5f5f5';for(let i=0;i<6;i++)ctx.fillRect(-63+i*6,jd+4,3,5);
  ctx.fillStyle='#ff1744';ctx.beginPath();ctx.arc(-34,0,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-33,0,2.5,0,Math.PI*2);ctx.fill();
  ctx.restore();ctx.globalAlpha=1;
}

function spawnVeh(){
  const types=[
    {t:'car',w:58,h:26,col:'#e53935',roof:'#c62828'},
    {t:'car',w:60,h:26,col:'#1e88e5',roof:'#1565c0'},
    {t:'car',w:56,h:24,col:'#fdd835',roof:'#f9a825'},
    {t:'car',w:58,h:26,col:'#43a047',roof:'#2e7d32'},
    {t:'van',w:70,h:34,col:'#ff7043',roof:'#bf360c'},
    {t:'truck',w:84,h:32,col:'#78909c',roof:'#455a64'},
    {t:'moto',w:42,h:30,col:'#212121',acc:'#ff6f00'},
  ];
  const vt=types[Math.floor(Math.random()*types.length)];
  const left=Math.random()>0.5;
  // 5 lanes spanning full road top to bottom — no safe zone
  const lanes=[232,260,288,316,344,372];
  const lane=lanes[Math.floor(Math.random()*lanes.length)];
  const spd=0.8+Math.random()*0.8+Math.min(score/300,0.8)+(lvlNum>=3?0.6:0);
  vehs.push({...vt,x:left?-100:W+100,y:lane,vx:left?spd:-spd,honked:false});
}

function drawVeh(v){
  ctx.save();ctx.translate(v.x,v.y);if(v.vx<0)ctx.scale(-1,1);
  if(v.t==='moto'){
    ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(-14,0,11,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(14,0,11,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(-14,0,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(14,0,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=v.col;ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(0,-16);ctx.lineTo(14,0);ctx.stroke();ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(14,0);ctx.stroke();
    ctx.strokeStyle='#888';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(10,-16);ctx.lineTo(18,-12);ctx.stroke();
    ctx.fillStyle=v.acc;ctx.fillRect(-6,-30,12,16);ctx.fillStyle='#222';ctx.beginPath();ctx.arc(0,-32,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(100,200,255,0.5)';ctx.beginPath();ctx.arc(2,-32,5,Math.PI*0.6,Math.PI*2.2);ctx.fill();
  } else {
    const w=v.w,h=v.h;
    ctx.fillStyle=v.col;ctx.beginPath();ctx.roundRect(-w/2,-h,w,h,4);ctx.fill();
    if(v.t==='car'){ctx.fillStyle=v.roof;ctx.beginPath();ctx.roundRect(-w/2+9,-h-16,w-18,18,5);ctx.fill();ctx.fillStyle='rgba(180,225,255,0.65)';ctx.beginPath();ctx.roundRect(-w/2+11,-h-14,w-22,13,3);ctx.fill();}
    else if(v.t==='van'){ctx.fillStyle=v.roof;ctx.fillRect(-w/2+3,-h-20,w*0.6,22);ctx.fillStyle='rgba(180,225,255,0.5)';ctx.fillRect(-w/2+5,-h-18,18,15);}
    else{ctx.fillStyle=v.roof;ctx.fillRect(w/2-30,-h-22,28,24);ctx.fillStyle='rgba(180,225,255,0.5)';ctx.fillRect(w/2-28,-h-20,16,16);}
    ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(-w/2+13,0,10,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(w/2-13,0,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#888';ctx.beginPath();ctx.arc(-w/2+13,0,4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(w/2-13,0,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff9c4';ctx.fillRect(w/2-4,-h+5,5,7);ctx.fillStyle='#e53935';ctx.fillRect(-w/2-1,-h+5,5,7);
  }
  ctx.restore();
}

const PATROL_Y=100;
const DIVE_Y=H-120;

let _bside=0;
function spawnBird(){_bside=1-_bside;const left=_bside===0;
  const spd=1.2+Math.random()*0.8+Math.min((score-THRESH)/200,0.8);
  birds.push({x:left?-40:W+40,y:PATROL_Y+Math.random()*35,vx:left?spd:-spd,vy:0,state:'patrol',wing:0,chirped:false});
}

function drawBird(b){
  ctx.save();ctx.translate(b.x,b.y);if(b.vx<0)ctx.scale(-1,1);
  const wf=Math.sin(b.wing*0.3)*14;
  const diving=b.state==='diving';
  ctx.fillStyle=diving?'#b71c1c':'#4e342e';
  ctx.beginPath();ctx.ellipse(0,0,13,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=diving?'#ef5350':'#6d4c41';
  ctx.beginPath();ctx.moveTo(-4,-2);ctx.lineTo(-22,-2+wf);ctx.lineTo(-4,5);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(4,-2);ctx.lineTo(22,-2+wf);ctx.lineTo(4,5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ff8f00';ctx.beginPath();ctx.moveTo(13,-1);ctx.lineTo(22,2);ctx.lineTo(13,5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(9,-2,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(10,-2,1.5,0,Math.PI*2);ctx.fill();
  if(diving&&b.y<H-120){
    ctx.strokeStyle='rgba(255,50,50,0.3)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(0,Math.min(80,(H-60-b.y)));ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

function drawChompZone(){
  if(P.chomp>0){
    ctx.save();ctx.globalAlpha=P.chomp/22*0.35;
    ctx.fillStyle='#ffee00';
    ctx.beginPath();ctx.arc(P.x-15,P.y,55,Math.PI*0.65,Math.PI*1.35);ctx.fill();
    ctx.restore();
  }
}

function overlap(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function pBox(){
  if(level===1)return{x:P.x-9,y:P.y-28,w:18,h:52};
  return{x:P.x-28,y:P.y-10,w:44,h:18};
}

function doHit(){if(inv>0)return;lives--;inv=90;crash();spark(P.x,P.y,'#ff1744');document.getElementById('lives').textContent=Math.max(0,lives);if(lives<=0){dead=true;if(Math.floor(score)>hi){hi=Math.floor(score);document.getElementById('hi').textContent=hi;}}}

function checkColl(){
  if(inv>0)return;
  const pb=pBox();
  if(level===1){
    for(const v of vehs){const sameLane=Math.abs((v.y-v.h/2)-(P.y))<22;if(sameLane&&overlap(pb.x,pb.y,pb.w,pb.h,v.x-v.w/2,v.y-v.h,v.w,v.h)){doHit();return;}}
  } else {
    for(const b of birds){
      if(b.state==='diving'&&b.y>H-140){
        if(overlap(pb.x,pb.y,pb.w,pb.h,b.x-14,b.y-8,28,16)){doHit();return;}
      }
    }
  }
}

function drawHUD(){
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.48)';ctx.fillRect(0,0,W,26);
  ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='left';
  ctx.fillText(level===1?'🏙️ City — Arrows to dodge':'🌿 Forest — ← → move  SPACE chomp diving birds',8,17);
  ctx.textAlign='right';ctx.fillStyle='#ffdd55';ctx.fillText('Score: '+Math.floor(score),W-8,17);
  ctx.restore();
}

function drawTrans(){
  if(trans<=0)return;
  const a=trans>40?1:trans/40;
  ctx.save();ctx.globalAlpha=a;ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#69f0ae';ctx.font='bold 26px sans-serif';ctx.textAlign='center';
  ctx.fillText('SKULLCRUNCHER TRANSFORMS!',W/2,H/2-14);
  ctx.fillStyle='#fff';ctx.font='15px sans-serif';ctx.fillText('Level 2 — Forest! SPACE to chomp diving birds!',W/2,H/2+18);
  ctx.restore();
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff1744';ctx.font='bold 46px sans-serif';ctx.fillText('GAME OVER!',W/2,H/2-44);
  ctx.fillStyle='#ffdd55';ctx.font='22px sans-serif';ctx.fillText('Score: '+Math.floor(score),W/2,H/2+4);
  const isHi=Math.floor(score)>=hi&&score>0;
  ctx.fillStyle=isHi?'#ffee00':'#fff';ctx.font='17px sans-serif';
  ctx.fillText(isHi?'🏆 NEW BEST: '+hi+'!':'Best: '+hi,W/2,H/2+36);
  ctx.fillStyle='#aaa';ctx.font='14px sans-serif';ctx.fillText('SPACE or ENTER to play again',W/2,H/2+70);
}

function update(){
  if(dead)return;
  const mv=K['ArrowLeft']||K['ArrowRight']||K['ArrowUp']||K['ArrowDown']||K['a']||K['A']||K['d']||K['D']||K['w']||K['W']||K['s']||K['S'];
  if(K['ArrowLeft']||K['a']||K['A'])P.x=Math.max(30,P.x-P.spd);
  if(K['ArrowRight']||K['d']||K['D'])P.x=Math.min(W-30,P.x+P.spd);
  if(level===1){
    if(K['ArrowUp']||K['w']||K['W'])P.y=Math.max(220,P.y-P.spd);
    if(K['ArrowDown']||K['s']||K['S'])P.y=Math.min(H-25,P.y+P.spd);
  }
  if(P.chomp>0)P.chomp--;
  if(inv>0)inv--;
  score+=0.03;document.getElementById('score').textContent=Math.floor(score);
  stompT--;if(stompT<=0&&mv){stomp();stompT=28;}

  if(level===2&&dodged>=50&&trans===0){level=1;lvlNum=3;trans=130;birds=[];vehs=[];vT=55;P.x=W/2;P.y=H-60;P.chomp=0;dodged=0;lives=5;document.getElementById('lives').textContent='5';document.getElementById('lvlLabel').textContent='Level 3: City';document.getElementById('dodgelabel').innerHTML='🚗 <strong id="dodgecount">0</strong>/50';}
  if(level===1&&dodged>=50&&trans===0){level=2;trans=130;vehs=[];birds=[];bT=80;P.x=W/2;P.y=H-60;P.chomp=0;dodged=0;lvlNum=2;lives=5;document.getElementById('lives').textContent='5';document.getElementById('lvlLabel').textContent='Level 2: Forest';document.getElementById('dodgelabel').innerHTML='🐦 <strong id="dodgecount">0</strong>/50';}
  if(trans>0){trans--;return;}

  if(level===1){
    vT--;if(vT<=0){spawnVeh();dodged++;document.getElementById('dodgecount').textContent=dodged;vT=Math.max(lvlNum>=3?40:55,100-Math.floor(score/10));}
    vehs=vehs.filter(v=>{v.x+=v.vx;if(!v.honked&&Math.abs(v.x-P.x)<140){v.honked=true;honk();}return v.x>-130&&v.x<W+130;});
  } else {
    bT--;if(bT<=0){spawnBird();dodged++;document.getElementById('dodgecount').textContent=dodged;bT=Math.max(55,110-Math.floor((score-THRESH)/10));}
    birds=birds.filter(b=>{
      b.wing++;
      if(!b.chirped&&Math.abs(b.x-P.x)<200){b.chirped=true;chirp();}
      if(b.state==='patrol'){
        b.x+=b.vx;
        b.y=PATROL_Y+Math.sin(tt*0.03+b.x*0.01)*22;
        if(Math.abs(b.x-P.x)<70&&Math.random()<0.025){b.state='diving';b.vy=0;}
      } else if(b.state==='diving'){
        b.vy+=0.18;b.vy=Math.min(b.vy,4);b.y+=b.vy;
        const dx=P.x-b.x;b.x+=Math.sign(dx)*Math.min(Math.abs(dx)*0.025,1.2);
        if(b.y>=DIVE_Y){b.state='retreating';b.vy=-3;}
      } else {
        b.vy*=0.88;b.y+=b.vy;b.x+=b.vx*1.8;
        if(b.y<PATROL_Y-10)b.state='patrol';
      }
      return b.x>-90&&b.x<W+90&&b.y<H+30;
    });
  }
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.l-=0.04;return p.l>0;});
  checkColl();
  tt++;
}

function loop(){
  if(level===1)cityBg();else forestBg();
  if(!dead){
    update();
    if(trans>0){drawRobot(P.x,P.y);drawTrans();}
    else if(level===1){vehs.forEach(drawVeh);drawRobot(P.x,P.y);}
    else{drawChompZone();birds.forEach(drawBird);drawCroc(P.x,P.y);}
    for(const p of parts){ctx.globalAlpha=p.l;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,4*p.l,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
    drawHUD();
  } else {
    if(level===1)drawRobot(P.x,P.y);else drawCroc(P.x,P.y);
    drawGameOver();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
